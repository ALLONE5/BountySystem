<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 页面调试测试</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #f0f2f5;
        }
        .test-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 16px 0;
        }
        .success { color: #52c41a; }
        .error { color: #ff4d4f; }
        .warning { color: #faad14; }
    </style>
</head>
<body>
    <div class="test-card">
        <h1>🔧 页面调试测试</h1>
        <p>如果您能看到这个页面，说明基本的 HTML 渲染是正常的。</p>
        
        <h3>📋 检查清单:</h3>
        <ul>
            <li id="js-check" class="warning">JavaScript 执行: 检查中...</li>
            <li id="fetch-check" class="warning">网络请求: 检查中...</li>
            <li id="storage-check" class="warning">本地存储: 检查中...</li>
        </ul>
        
        <div style="margin-top: 20px;">
            <button onclick="testMainApp()" style="margin: 5px; padding: 10px 20px;">测试主应用</button>
            <button onclick="testAPI()" style="margin: 5px; padding: 10px 20px;">测试 API</button>
            <button onclick="clearAll()" style="margin: 5px; padding: 10px 20px;">清除所有缓存</button>
        </div>
        
        <div id="results" style="margin-top: 20px;"></div>
    </div>

    <script>
        // 基础检查
        document.getElementById('js-check').innerHTML = '<span class="success">JavaScript 执行: ✅ 正常</span>';
        
        // 检查本地存储
        try {
            localStorage.setItem('test', 'test');
            localStorage.removeItem('test');
            document.getElementById('storage-check').innerHTML = '<span class="success">本地存储: ✅ 正常</span>';
        } catch (e) {
            document.getElementById('storage-check').innerHTML = '<span class="error">本地存储: ❌ 异常</span>';
        }
        
        // 检查网络
        fetch('http://localhost:3000')
            .then(response => {
                if (response.ok) {
                    document.getElementById('fetch-check').innerHTML = '<span class="success">网络请求: ✅ 正常</span>';
                } else {
                    document.getElementById('fetch-check').innerHTML = '<span class="error">网络请求: ❌ 异常</span>';
                }
            })
            .catch(error => {
                document.getElementById('fetch-check').innerHTML = '<span class="error">网络请求: ❌ 失败</span>';
            });
        
        function testMainApp() {
            window.open('http://localhost:3000', '_blank');
        }
        
        function testAPI() {
            fetch('http://localhost:5000/api/health')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('results').innerHTML = '<div class="test-card"><h4>API 测试结果:</h4><pre>' + JSON.stringify(data, null, 2) + '</pre></div>';
                })
                .catch(error => {
                    document.getElementById('results').innerHTML = '<div class="test-card"><h4>API 测试结果:</h4><p class="error">❌ API 请求失败: ' + error.message + '</p></div>';
                });
        }
        
        function clearAll() {
            localStorage.clear();
            sessionStorage.clear();
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => {
                        caches.delete(name);
                    });
                });
            }
            document.getElementById('results').innerHTML = '<div class="test-card"><p class="success">✅ 所有缓存已清除，请刷新页面</p></div>';
        }
        
        console.log('🔧 调试页面已加载');
        console.log('📋 请检查主应用是否正常工作');
    </script>
</body>
</html>
