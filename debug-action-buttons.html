<!DOCTYPE html>
<html>
<head>
    <title>Debug Action Buttons - 5173</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f2f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1890ff;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            background: #fafafa;
            border-radius: 4px;
        }
        button {
            background: #1890ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #40a9ff;
        }
        .output {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .error {
            color: #ff4d4f;
        }
        .success {
            color: #52c41a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug Action Buttons - Port 5173</h1>
        
        <div class="section">
            <h2>检查当前用户信息</h2>
            <button onclick="checkUser()">获取用户信息</button>
            <div id="userOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>检查任务列表</h2>
            <button onclick="checkTasks()">获取任务列表</button>
            <div id="tasksOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>检查按钮渲染条件</h2>
            <button onclick="checkButtonConditions()">分析按钮条件</button>
            <div id="conditionsOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>检查 Props 传递</h2>
            <button onclick="checkProps()">检查组件 Props</button>
            <div id="propsOutput" class="output"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        async function checkUser() {
            const output = document.getElementById('userOutput');
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    output.innerHTML = '<span class="error">❌ 未找到 token，请先登录</span>';
                    return;
                }

                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const user = data.data || data;
                
                output.innerHTML = `<span class="success">✅ 用户信息：</span>\n${JSON.stringify(user, null, 2)}`;
            } catch (error) {
                output.innerHTML = `<span class="error">❌ 错误: ${error.message}</span>`;
            }
        }

        async function checkTasks() {
            const output = document.getElementById('tasksOutput');
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    output.innerHTML = '<span class="error">❌ 未找到 token，请先登录</span>';
                    return;
                }

                const response = await fetch(`${API_BASE}/tasks/published`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const tasks = data.data || data;
                
                output.innerHTML = `<span class="success">✅ 找到 ${tasks.length} 个任务：</span>\n${JSON.stringify(tasks.map(t => ({
                    id: t.id,
                    name: t.name,
                    status: t.status,
                    publisherId: t.publisherId,
                    assigneeId: t.assigneeId
                })), null, 2)}`;
            } catch (error) {
                output.innerHTML = `<span class="error">❌ 错误: ${error.message}</span>`;
            }
        }

        async function checkButtonConditions() {
            const output = document.getElementById('conditionsOutput');
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    output.innerHTML = '<span class="error">❌ 未找到 token，请先登录</span>';
                    return;
                }

                // Get user
                const userResponse = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const userData = await userResponse.json();
                const user = userData.data || userData;

                // Get tasks
                const tasksResponse = await fetch(`${API_BASE}/tasks/published`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const tasksData = await tasksResponse.json();
                const tasks = tasksData.data || tasksData;

                let result = `<span class="success">✅ 按钮条件分析：</span>\n\n`;
                result += `当前用户 ID: ${user.id}\n\n`;

                tasks.forEach(task => {
                    const isPublisher = user.id === task.publisherId;
                    const isNotStarted = task.status === 'NOT_STARTED';
                    const isAvailable = task.status === 'AVAILABLE';
                    const hasAssignee = !!task.assigneeId;

                    result += `\n任务: ${task.name} (ID: ${task.id})\n`;
                    result += `  状态: ${task.status}\n`;
                    result += `  发布者ID: ${task.publisherId}\n`;
                    result += `  承接者ID: ${task.assigneeId || '无'}\n`;
                    result += `  是否为发布者: ${isPublisher ? '是' : '否'}\n`;
                    result += `  \n`;
                    result += `  按钮条件:\n`;
                    result += `    - 发布按钮: ${isPublisher && isNotStarted ? '✅ 显示' : '❌ 隐藏'}\n`;
                    result += `    - 编辑按钮: ${isPublisher ? '✅ 显示' : '❌ 隐藏'}\n`;
                    result += `    - 指派按钮: ${!hasAssignee && (isNotStarted || isAvailable) ? '✅ 显示' : '❌ 隐藏'}\n`;
                    result += `    - 删除按钮: ${isPublisher && (isNotStarted || isAvailable) ? '✅ 显示' : '❌ 隐藏'}\n`;
                });

                output.innerHTML = result;
            } catch (error) {
                output.innerHTML = `<span class="error">❌ 错误: ${error.message}</span>`;
            }
        }

        async function checkProps() {
            const output = document.getElementById('propsOutput');
            
            // Check if React DevTools is available
            if (typeof window.__REACT_DEVTOOLS_GLOBAL_HOOK__ === 'undefined') {
                output.innerHTML = '<span class="error">❌ 请安装 React DevTools 扩展来检查组件 Props</span>';
                return;
            }

            output.innerHTML = `<span class="success">✅ 请打开浏览器控制台，查看以下日志：</span>\n\n`;
            output.innerHTML += `1. 查找包含 "[5173 TaskListTable]" 的日志\n`;
            output.innerHTML += `2. 检查每个任务的按钮渲染条件\n`;
            output.innerHTML += `3. 查看 "final buttons" 日志，确认实际渲染的按钮\n\n`;
            output.innerHTML += `如果没有看到这些日志，说明组件可能没有正确加载或 props 没有传递。`;
        }
    </script>
</body>
</html>
