<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .result {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <h1>排行榜API测试</h1>
    
    <div class="test-section">
        <h2>1. 登录测试</h2>
        <button onclick="testLogin()">测试登录</button>
        <div id="loginResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. 排行榜API测试</h2>
        <button onclick="testMonthlyRankings()">月度排行</button>
        <button onclick="testQuarterlyRankings()">季度排行</button>
        <button onclick="testAllTimeRankings()">全时排行</button>
        <div id="rankingResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. 前端页面测试</h2>
        <p>请在浏览器中访问: <a href="http://localhost:5173/ranking" target="_blank">http://localhost:5173/ranking</a></p>
    </div>

    <script>
        let authToken = null;

        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'testuser',
                        password: 'testpass123'
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '登录成功！Token已保存。';
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '登录失败: ' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '登录错误: ' + error.message;
            }
        }

        async function testRankings(period, year, month, quarter) {
            if (!authToken) {
                alert('请先登录！');
                return;
            }

            const resultDiv = document.getElementById('rankingResult');
            try {
                const params = new URLSearchParams({ period });
                if (year) params.append('year', year);
                if (month) params.append('month', month);
                if (quarter) params.append('quarter', quarter);

                const response = await fetch(`http://localhost:3000/api/rankings?${params}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `${period}排行榜数据 (${data.length}条):\n` + 
                        JSON.stringify(data.slice(0, 3), null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '获取排行榜失败: ' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '排行榜错误: ' + error.message;
            }
        }

        function testMonthlyRankings() {
            const currentDate = new Date();
            testRankings('monthly', currentDate.getFullYear(), currentDate.getMonth() + 1);
        }

        function testQuarterlyRankings() {
            const currentDate = new Date();
            const quarter = Math.ceil((currentDate.getMonth() + 1) / 3);
            testRankings('quarterly', currentDate.getFullYear(), null, quarter);
        }

        function testAllTimeRankings() {
            const currentDate = new Date();
            testRankings('all_time', currentDate.getFullYear());
        }
    </script>
</body>
</html>
