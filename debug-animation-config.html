<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动画配置调试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success { background: #2d5a2d; }
        .error { background: #5a2d2d; }
        .warning { background: #5a5a2d; }
        pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        button {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0284c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 动画配置调试工具</h1>
        
        <div class="section">
            <h2>📡 API连接测试</h2>
            <button onclick="testPublicConfig()">测试公共配置API</button>
            <div id="api-status"></div>
            <pre id="api-response"></pre>
        </div>
        
        <div class="section">
            <h2>🎭 前端配置检查</h2>
            <button onclick="checkFrontendConfig()">检查前端配置</button>
            <div id="frontend-status"></div>
            <pre id="frontend-config"></pre>
        </div>
        
        <div class="section">
            <h2>🎬 动画元素检查</h2>
            <button onclick="checkAnimationElements()">检查动画元素</button>
            <div id="animation-status"></div>
            <pre id="animation-elements"></pre>
        </div>
        
        <div class="section">
            <h2>🎨 CSS变量检查</h2>
            <button onclick="checkCSSVariables()">检查CSS变量</button>
            <div id="css-status"></div>
            <pre id="css-variables"></pre>
        </div>
    </div>

    <script>
        async function testPublicConfig() {
            const statusEl = document.getElementById('api-status');
            const responseEl = document.getElementById('api-response');
            
            try {
                statusEl.innerHTML = '<div class="status warning">⏳ 正在测试API...</div>';
                
                const response = await fetch('http://localhost:3000/api/public/config');
                const data = await response.json();
                
                if (response.ok) {
                    statusEl.innerHTML = '<div class="status success">✅ API连接成功</div>';
                    responseEl.textContent = JSON.stringify(data, null, 2);
                } else {
                    statusEl.innerHTML = '<div class="status error">❌ API响应错误</div>';
                    responseEl.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                statusEl.innerHTML = '<div class="status error">❌ API连接失败: ' + error.message + '</div>';
                responseEl.textContent = error.toString();
            }
        }
        
        function checkFrontendConfig() {
            const statusEl = document.getElementById('frontend-status');
            const configEl = document.getElementById('frontend-config');
            
            try {
                // 检查localStorage中的主题设置
                const theme = localStorage.getItem('theme');
                
                // 检查CSS变量
                const root = document.documentElement;
                const computedStyle = getComputedStyle(root);
                
                const config = {
                    localStorage: {
                        theme: theme
                    },
                    cssVariables: {
                        primaryColor: computedStyle.getPropertyValue('--color-primary'),
                        secondaryColor: computedStyle.getPropertyValue('--color-secondary'),
                        bgPrimary: computedStyle.getPropertyValue('--color-bg-primary')
                    },
                    documentAttributes: {
                        dataTheme: root.getAttribute('data-theme'),
                        bodyClasses: Array.from(document.body.classList)
                    }
                };
                
                statusEl.innerHTML = '<div class="status success">✅ 前端配置检查完成</div>';
                configEl.textContent = JSON.stringify(config, null, 2);
            } catch (error) {
                statusEl.innerHTML = '<div class="status error">❌ 前端配置检查失败: ' + error.message + '</div>';
                configEl.textContent = error.toString();
            }
        }
        
        function checkAnimationElements() {
            const statusEl = document.getElementById('animation-status');
            const elementsEl = document.getElementById('animation-elements');
            
            try {
                const animationContainer = document.querySelector('.animation-container');
                const scanlines = document.querySelectorAll('.scanline-vertical, .scanline-horizontal');
                const particles = document.querySelectorAll('.floating-particles .particle');
                const hexBackground = document.querySelector('.hex-background');
                const dataStream = document.querySelector('.data-stream');
                const hologram = document.querySelector('.hologram-overlay');
                const energyEffects = document.querySelector('.energy-effects');
                const gridBackground = document.querySelector('.grid-background');
                
                const elements = {
                    animationContainer: {
                        found: !!animationContainer,
                        count: animationContainer ? 1 : 0,
                        styles: animationContainer ? getComputedStyle(animationContainer) : null
                    },
                    scanlines: {
                        found: scanlines.length > 0,
                        count: scanlines.length
                    },
                    particles: {
                        found: particles.length > 0,
                        count: particles.length
                    },
                    hexBackground: {
                        found: !!hexBackground,
                        count: hexBackground ? 1 : 0
                    },
                    dataStream: {
                        found: !!dataStream,
                        count: dataStream ? 1 : 0
                    },
                    hologram: {
                        found: !!hologram,
                        count: hologram ? 1 : 0
                    },
                    energyEffects: {
                        found: !!energyEffects,
                        count: energyEffects ? 1 : 0
                    },
                    gridBackground: {
                        found: !!gridBackground,
                        count: gridBackground ? 1 : 0
                    }
                };
                
                const hasAnyAnimation = Object.values(elements).some(el => el.found);
                
                if (hasAnyAnimation) {
                    statusEl.innerHTML = '<div class="status success">✅ 找到动画元素</div>';
                } else {
                    statusEl.innerHTML = '<div class="status warning">⚠️ 未找到动画元素</div>';
                }
                
                elementsEl.textContent = JSON.stringify(elements, null, 2);
            } catch (error) {
                statusEl.innerHTML = '<div class="status error">❌ 动画元素检查失败: ' + error.message + '</div>';
                elementsEl.textContent = error.toString();
            }
        }
        
        function checkCSSVariables() {
            const statusEl = document.getElementById('css-status');
            const variablesEl = document.getElementById('css-variables');
            
            try {
                const root = document.documentElement;
                const computedStyle = getComputedStyle(root);
                
                const variables = {
                    colors: {
                        primary: computedStyle.getPropertyValue('--color-primary'),
                        secondary: computedStyle.getPropertyValue('--color-secondary'),
                        bgPrimary: computedStyle.getPropertyValue('--color-bg-primary'),
                        bgSecondary: computedStyle.getPropertyValue('--color-bg-secondary'),
                        textPrimary: computedStyle.getPropertyValue('--color-text-primary')
                    },
                    antdVariables: {
                        primaryColor: computedStyle.getPropertyValue('--ant-primary-color'),
                        textColor: computedStyle.getPropertyValue('--ant-text-color'),
                        backgroundColor: computedStyle.getPropertyValue('--ant-background-color-base')
                    }
                };
                
                const hasVariables = Object.values(variables.colors).some(val => val.trim() !== '');
                
                if (hasVariables) {
                    statusEl.innerHTML = '<div class="status success">✅ CSS变量已设置</div>';
                } else {
                    statusEl.innerHTML = '<div class="status warning">⚠️ CSS变量未设置</div>';
                }
                
                variablesEl.textContent = JSON.stringify(variables, null, 2);
            } catch (error) {
                statusEl.innerHTML = '<div class="status error">❌ CSS变量检查失败: ' + error.message + '</div>';
                variablesEl.textContent = error.toString();
            }
        }
        
        // 自动运行初始检查
        window.addEventListener('load', () => {
            setTimeout(() => {
                testPublicConfig();
                checkFrontendConfig();
                checkAnimationElements();
                checkCSSVariables();
            }, 1000);
        });
    </script>
</body>
</html>
