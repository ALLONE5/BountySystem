<!DOCTYPE html>
<html>
<head>
    <title>测试登录状态 - 备份前端</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>备份前端登录状态测试</h1>
    
    <div id="status"></div>
    
    <h2>LocalStorage 内容：</h2>
    <pre id="localStorage"></pre>
    
    <h2>操作：</h2>
    <button onclick="checkAuth()">检查认证状态</button>
    <button onclick="clearStorage()">清除 LocalStorage</button>
    <button onclick="goToDashboard()">跳转到 Dashboard</button>
    <button onclick="goToLogin()">跳转到登录页</button>
    
    <script>
        function showStatus(message, isSuccess) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status ' + (isSuccess ? 'success' : 'error');
            statusDiv.textContent = message;
        }
        
        function displayLocalStorage() {
            const storage = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                storage[key] = localStorage.getItem(key);
            }
            document.getElementById('localStorage').textContent = JSON.stringify(storage, null, 2);
        }
        
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                showStatus('❌ 未找到 token，用户未登录', false);
                return;
            }
            
            showStatus('✅ 找到 token: ' + token.substring(0, 20) + '...', true);
            
            // 尝试调用 API 验证 token
            try {
                const response = await fetch('http://localhost:3001/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    showStatus('✅ Token 有效！用户: ' + user.username + ' (ID: ' + user.id + ')', true);
                } else {
                    showStatus('❌ Token 无效或已过期', false);
                }
            } catch (error) {
                showStatus('❌ API 调用失败: ' + error.message, false);
            }
        }
        
        function clearStorage() {
            localStorage.clear();
            showStatus('✅ LocalStorage 已清除', true);
            displayLocalStorage();
        }
        
        function goToDashboard() {
            window.location.href = 'http://localhost:5174/dashboard';
        }
        
        function goToLogin() {
            window.location.href = 'http://localhost:5174/auth/login';
        }
        
        // 页面加载时显示 localStorage
        displayLocalStorage();
        checkAuth();
    </script>
</body>
</html>
