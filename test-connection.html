<!DOCTYPE html>
<html>
<head>
    <title>连接测试</title>
</head>
<body>
    <h1>前后端连接测试</h1>
    <div id="result"></div>
    
    <script>
        async function testConnection() {
            try {
                // 测试后端健康检查
                const healthResponse = await fetch('http://localhost:3000/health');
                const healthData = await healthResponse.json();
                
                // 测试API端点
                const apiResponse = await fetch('http://localhost:3000/api');
                const apiData = await apiResponse.json();
                
                document.getElementById('result').innerHTML = `
                    <h2>✅ 连接成功</h2>
                    <p><strong>后端健康状态:</strong> ${healthData.status}</p>
                    <p><strong>API消息:</strong> ${apiData.message}</p>
                    <p><strong>API版本:</strong> ${apiData.version}</p>
                    <p><strong>时间戳:</strong> ${healthData.timestamp}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h2>❌ 连接失败</h2>
                    <p><strong>错误:</strong> ${error.message}</p>
                `;
            }
        }
        
        testConnection();
    </script>
</body>
</html>
