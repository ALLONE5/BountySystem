<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置调试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .success {
            background-color: #f0f9ff;
            border-color: #0ea5e9;
        }
        .error {
            background-color: #fef2f2;
            border-color: #ef4444;
        }
        .loading {
            background-color: #fffbeb;
            border-color: #f59e0b;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #2563eb;
        }
        img {
            max-width: 100px;
            max-height: 50px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>系统配置调试工具</h1>
    
    <div class="test-section">
        <h3>1. 后端连接测试</h3>
        <button onclick="testBackendHealth()">测试后端健康状态</button>
        <div id="backend-health-result"></div>
    </div>

    <div class="test-section">
        <h3>2. 公开配置API测试</h3>
        <button onclick="testPublicConfigAPI()">测试公开配置API</button>
        <div id="public-config-result"></div>
    </div>

    <div class="test-section">
        <h3>3. 管理员配置API测试</h3>
        <button onclick="testAdminLogin()">先登录管理员</button>
        <button onclick="testAdminConfigAPI()">测试管理员配置API</button>
        <div id="admin-config-result"></div>
    </div>

    <div class="test-section">
        <h3>4. 前端集成测试</h3>
        <button onclick="testFrontendIntegration()">测试前端集成</button>
        <div id="frontend-integration-result"></div>
    </div>

    <script>
        let adminToken = null;

        async function testBackendHealth() {
            const resultDiv = document.getElementById('backend-health-result');
            resultDiv.innerHTML = '<div class="loading">测试中...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/health');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ 后端健康检查成功</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ 后端连接失败</h4>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testPublicConfigAPI() {
            const resultDiv = document.getElementById('public-config-result');
            resultDiv.innerHTML = '<div class="loading">测试中...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/api/public/config');
                const data = await response.json();
                
                if (data.success) {
                    const config = data.data;
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✅ 公开配置API成功</h4>
                            <p><strong>网站名称:</strong> ${config.siteName}</p>
                            <p><strong>网站描述:</strong> ${config.siteDescription}</p>
                            <p><strong>Logo URL:</strong> ${config.logoUrl}</p>
                            ${config.logoUrl ? `<p><strong>Logo预览:</strong><br><img src="http://localhost:3000${config.logoUrl}" alt="Logo" onerror="this.style.display='none'" /></p>` : ''}
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                    
                    // 更新页面标题
                    document.title = config.siteName;
                } else {
                    throw new Error('API返回失败状态');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ 公开配置API失败</h4>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testAdminLogin() {
            const resultDiv = document.getElementById('admin-config-result');
            resultDiv.innerHTML = '<div class="loading">登录中...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'Password123'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    adminToken = data.token;
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✅ 管理员登录成功</h4>
                            <p>Token已获取，可以测试管理员API</p>
                        </div>
                    `;
                } else {
                    throw new Error(data.message || '登录失败');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ 管理员登录失败</h4>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testAdminConfigAPI() {
            const resultDiv = document.getElementById('admin-config-result');
            
            if (!adminToken) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ 需要先登录管理员</h4>
                        <p>请先点击"先登录管理员"按钮</p>
                    </div>
                `;
                return;
            }
            
            resultDiv.innerHTML = '<div class="loading">测试中...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/api/admin/system/config', {
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✅ 管理员配置API成功</h4>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    throw new Error(data.message || 'API调用失败');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ 管理员配置API失败</h4>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testFrontendIntegration() {
            const resultDiv = document.getElementById('frontend-integration-result');
            resultDiv.innerHTML = '<div class="loading">测试中...</div>';
            
            try {
                // 模拟前端SystemConfigContext的行为
                console.log('🔄 Loading system config...');
                const response = await fetch('http://localhost:3000/api/public/config');
                const data = await response.json();
                
                if (data.success) {
                    const config = data.data;
                    console.log('✅ System config loaded:', config);
                    
                    // 更新页面标题
                    if (config.siteName) {
                        document.title = config.siteName;
                        console.log('📝 Updated page title to:', config.siteName);
                    }
                    
                    // 更新favicon
                    if (config.logoUrl) {
                        updateFavicon(config.logoUrl);
                        console.log('🖼️ Updated favicon to:', config.logoUrl);
                    }
                    
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✅ 前端集成测试成功</h4>
                            <p><strong>页面标题已更新为:</strong> ${document.title}</p>
                            <p><strong>网站名称:</strong> ${config.siteName}</p>
                            <p><strong>Logo URL:</strong> ${config.logoUrl}</p>
                            <p><strong>网站描述:</strong> ${config.siteDescription}</p>
                            <p>检查浏览器标签页标题和favicon是否已更新</p>
                        </div>
                    `;
                } else {
                    throw new Error('API返回失败状态');
                }
            } catch (error) {
                console.error('❌ Failed to load system config:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ 前端集成测试失败</h4>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        }

        function updateFavicon(logoUrl) {
            // 移除现有的favicon
            const existingFavicon = document.querySelector('link[rel="icon"]') || 
                                   document.querySelector('link[rel="shortcut icon"]');
            if (existingFavicon) {
                existingFavicon.remove();
            }

            // 添加新的favicon
            const link = document.createElement('link');
            link.rel = 'icon';
            link.type = 'image/png';
            link.href = logoUrl.startsWith('http') ? logoUrl : `http://localhost:3000${logoUrl}`;
            document.head.appendChild(link);
        }

        // 页面加载时自动运行基础测试
        window.addEventListener('load', () => {
            testBackendHealth();
            setTimeout(() => {
                testPublicConfigAPI();
            }, 1000);
        });
    </script>
</body>
</html>
