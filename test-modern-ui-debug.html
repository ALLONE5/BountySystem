<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代化 UI 调试测试</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .debug-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .debug-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .debug-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .debug-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .debug-item:last-child {
            border-bottom: none;
        }
        
        .status-indicator {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-success {
            background: #57f287;
            color: #2f3136;
        }
        
        .status-error {
            background: #ed4245;
            color: white;
        }
        
        .status-warning {
            background: #fee75c;
            color: #2f3136;
        }
        
        .test-button {
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 8px;
        }
        
        .test-button:hover {
            background: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }
        
        .console-output {
            background: #2f3136;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="debug-container">
        <div class="debug-section">
            <h1 class="debug-title">🎨 现代化 UI 调试面板</h1>
            <p>检测当前应用的现代化 UI 集成状态</p>
        </div>

        <div class="debug-section">
            <h2 class="debug-title">📋 系统检查</h2>
            <div id="system-checks">
                <!-- 动态填充 -->
            </div>
        </div>

        <div class="debug-section">
            <h2 class="debug-title">🔧 快速操作</h2>
            <button class="test-button" onclick="clearCache()">清除缓存</button>
            <button class="test-button" onclick="testModernUI()">测试现代 UI</button>
            <button class="test-button" onclick="checkConsoleErrors()">检查控制台错误</button>
            <button class="test-button" onclick="openMainApp()">打开主应用</button>
            <button class="test-button" onclick="openUIShowcase()">打开 UI 展示</button>
        </div>

        <div class="debug-section">
            <h2 class="debug-title">📊 控制台输出</h2>
            <div id="console-output" class="console-output">等待测试结果...</div>
        </div>
    </div>

    <script>
        // 控制台输出捕获
        const consoleOutput = document.getElementById('console-output');
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function addToConsole(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'warn' ? '⚠️' : '📝';
            consoleOutput.textContent += `[${timestamp}] ${prefix} ${message}\n`;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole(args.join(' '), 'warn');
        };

        // 系统检查函数
        function performSystemChecks() {
            const checks = [
                {
                    name: '前端开发服务器',
                    test: () => fetch('http://localhost:3000').then(r => r.ok),
                    description: '检查 React 开发服务器是否运行'
                },
                {
                    name: '后端 API 服务器',
                    test: () => fetch('http://localhost:5000/api/health').then(r => r.ok),
                    description: '检查后端 API 服务器是否运行'
                },
                {
                    name: '现代化样式加载',
                    test: () => {
                        return fetch('http://localhost:3000/src/styles/glassmorphism.css')
                            .then(r => r.ok)
                            .catch(() => false);
                    },
                    description: '检查玻璃态样式文件是否可访问'
                },
                {
                    name: '路由配置',
                    test: () => {
                        return fetch('http://localhost:3000/ui-showcase')
                            .then(r => r.status !== 404)
                            .catch(() => false);
                    },
                    description: '检查 UI 展示页面路由是否配置'
                }
            ];

            const checksContainer = document.getElementById('system-checks');
            checksContainer.innerHTML = '';

            checks.forEach(async (check, index) => {
                const item = document.createElement('div');
                item.className = 'debug-item';
                item.innerHTML = `
                    <div>
                        <strong>${check.name}</strong>
                        <br>
                        <small style="opacity: 0.7">${check.description}</small>
                    </div>
                    <div id="status-${index}" class="status-indicator status-warning">检查中...</div>
                `;
                checksContainer.appendChild(item);

                try {
                    const result = await check.test();
                    const statusEl = document.getElementById(`status-${index}`);
                    if (result) {
                        statusEl.className = 'status-indicator status-success';
                        statusEl.textContent = '✅ 正常';
                    } else {
                        statusEl.className = 'status-indicator status-error';
                        statusEl.textContent = '❌ 异常';
                    }
                } catch (error) {
                    const statusEl = document.getElementById(`status-${index}`);
                    statusEl.className = 'status-indicator status-error';
                    statusEl.textContent = '❌ 错误';
                    console.error(`检查 ${check.name} 时出错:`, error);
                }
            });
        }

        // 快速操作函数
        function clearCache() {
            console.log('🧹 开始清除缓存...');
            
            // 清除 localStorage
            localStorage.clear();
            console.log('✅ localStorage 已清除');
            
            // 清除 sessionStorage
            sessionStorage.clear();
            console.log('✅ sessionStorage 已清除');
            
            // 尝试清除 Service Worker 缓存
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    registrations.forEach(registration => {
                        registration.unregister();
                        console.log('✅ Service Worker 已注销');
                    });
                });
            }
            
            console.log('🎉 缓存清除完成！建议刷新页面或重启开发服务器');
        }

        function testModernUI() {
            console.log('🎨 开始测试现代化 UI...');
            
            // 检查关键 CSS 类是否存在
            const testClasses = [
                'glass-card',
                'discord-button-primary',
                'midjourney-card',
                'modern-layout'
            ];
            
            testClasses.forEach(className => {
                const elements = document.querySelectorAll(`.${className}`);
                if (elements.length > 0) {
                    console.log(`✅ 找到 ${elements.length} 个 .${className} 元素`);
                } else {
                    console.warn(`⚠️ 未找到 .${className} 元素`);
                }
            });
            
            // 检查 CSS 变量
            const rootStyles = getComputedStyle(document.documentElement);
            const testVariables = [
                '--glass-blur',
                '--discord-accent',
                '--midjourney-gradient-1'
            ];
            
            testVariables.forEach(variable => {
                const value = rootStyles.getPropertyValue(variable);
                if (value) {
                    console.log(`✅ CSS 变量 ${variable}: ${value.trim()}`);
                } else {
                    console.warn(`⚠️ CSS 变量 ${variable} 未定义`);
                }
            });
            
            console.log('🎉 现代化 UI 测试完成！');
        }

        function checkConsoleErrors() {
            console.log('🔍 检查控制台错误...');
            
            // 监听未来的错误
            window.addEventListener('error', (event) => {
                console.error(`JavaScript 错误: ${event.message} (${event.filename}:${event.lineno})`);
            });
            
            window.addEventListener('unhandledrejection', (event) => {
                console.error(`未处理的 Promise 拒绝: ${event.reason}`);
            });
            
            console.log('✅ 错误监听器已设置');
        }

        function openMainApp() {
            console.log('🚀 打开主应用...');
            window.open('http://localhost:3000', '_blank');
        }

        function openUIShowcase() {
            console.log('🎨 打开 UI 展示页面...');
            window.open('http://localhost:3000/ui-showcase', '_blank');
        }

        // 页面加载时执行系统检查
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🎯 现代化 UI 调试面板已加载');
            console.log('📋 开始执行系统检查...');
            performSystemChecks();
        });
    </script>
</body>
</html>
