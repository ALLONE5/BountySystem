<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试输入框边界 - Input Boundaries Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .test-container {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      box-sizing: border-box;
      overflow: hidden;
    }

    .test-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .test-title {
      font-size: 32px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
    }

    .test-subtitle {
      font-size: 15px;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 24px;
      width: 100%;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #334155;
    }

    .form-input {
      height: 48px;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.9);
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 12px 16px;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      background: white;
    }

    .form-button {
      height: 48px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border: none;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      color: white;
      cursor: pointer;
      font-family: inherit;
    }

    .form-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    .form-button:active {
      transform: translateY(0);
    }

    .boundary-indicator {
      position: relative;
      border: 2px dashed #ef4444;
      padding: 2px;
      margin: -2px;
      border-radius: 24px;
    }

    .info-box {
      margin-top: 24px;
      padding: 16px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .info-title {
      font-weight: 600;
      color: #1e40af;
      margin-bottom: 8px;
    }

    .info-text {
      font-size: 13px;
      color: #475569;
      line-height: 1.6;
    }

    .success {
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="test-container boundary-indicator">
    <div class="test-header">
      <h1 class="test-title">边界测试</h1>
      <p class="test-subtitle">验证输入框是否超出容器边界</p>
    </div>

    <form onsubmit="event.preventDefault(); checkBoundaries();">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input 
          type="text" 
          class="form-input" 
          id="username"
          placeholder="请输入用户名"
          value="这是一个很长很长很长很长很长很长的用户名测试"
        />
      </div>

      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input 
          type="email" 
          class="form-input" 
          id="email"
          placeholder="请输入邮箱地址"
          value="verylongemailaddress@verylongdomainname.com"
        />
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <input 
          type="password" 
          class="form-input" 
          id="password"
          placeholder="请输入密码"
          value="VeryLongPasswordWith123456789"
        />
      </div>

      <div class="form-group">
        <button type="submit" class="form-button">
          提交测试
        </button>
      </div>
    </form>

    <div class="info-box">
      <div class="info-title">测试说明</div>
      <div class="info-text">
        • 红色虚线框表示容器边界<br>
        • 所有输入框和按钮应该完全在红色框内<br>
        • 输入框已填充长文本用于测试<br>
        • <span id="result" class="success">✓ 如果没有元素超出边界，说明修复成功！</span>
      </div>
    </div>
  </div>

  <script>
    function checkBoundaries() {
      const container = document.querySelector('.test-container');
      const inputs = document.querySelectorAll('.form-input');
      const button = document.querySelector('.form-button');
      const result = document.getElementById('result');
      
      const containerRect = container.getBoundingClientRect();
      let allWithinBounds = true;
      
      [...inputs, button].forEach(element => {
        const rect = element.getBoundingClientRect();
        if (rect.right > containerRect.right - 40 || rect.left < containerRect.left + 40) {
          allWithinBounds = false;
        }
      });
      
      if (allWithinBounds) {
        result.innerHTML = '✓ 所有元素都在边界内！修复成功！';
        result.className = 'success';
      } else {
        result.innerHTML = '✗ 检测到元素超出边界';
        result.style.color = '#ef4444';
      }
    }
    
    // 页面加载时自动检查
    window.addEventListener('load', checkBoundaries);
    window.addEventListener('resize', checkBoundaries);
  </script>
</body>
</html>
