<!DOCTYPE html>
<html>
<head>
    <title>认证测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        input { padding: 8px; margin: 5px; width: 200px; }
        button { padding: 10px 20px; margin: 5px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <h1>认证测试</h1>
    
    <div class="form-group">
        <h3>登录测试</h3>
        <input type="text" id="username" placeholder="用户名或邮箱" value="admin">
        <input type="password" id="password" placeholder="密码" value="admin123">
        <button onclick="testLogin()">登录</button>
    </div>
    
    <div class="form-group">
        <h3>获取用户信息</h3>
        <button onclick="testGetMe()">获取当前用户</button>
    </div>
    
    <div id="result" class="result"></div>
    
    <script>
        let authToken = localStorage.getItem('token');
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                    showResult('success', `登录成功！用户: ${data.user.username}, Token: ${authToken.substring(0, 20)}...`);
                } else {
                    showResult('error', `登录失败: ${data.message}`);
                }
            } catch (error) {
                showResult('error', `登录错误: ${error.message}`);
            }
        }
        
        async function testGetMe() {
            if (!authToken) {
                showResult('error', '请先登录获取token');
                return;
            }
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('success', `用户信息获取成功: ${JSON.stringify(data, null, 2)}`);
                } else {
                    showResult('error', `获取用户信息失败: ${data.message}`);
                }
            } catch (error) {
                showResult('error', `请求错误: ${error.message}`);
            }
        }
        
        function showResult(type, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `<pre>${message}</pre>`;
        }
        
        // 页面加载时显示当前token状态
        if (authToken) {
            showResult('success', `已有token: ${authToken.substring(0, 20)}...`);
        } else {
            showResult('error', '未登录，请先登录');
        }
    </script>
</body>
</html>
